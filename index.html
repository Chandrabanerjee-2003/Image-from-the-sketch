<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas to Diffusion</title>
  <style>
    body { background-color: #fdf6e3; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .main-container { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    #canvasContainer { border: 3px solid #333; background: #fff; line-height: 0; }
    canvas { cursor: crosshair; }
    .controls { margin-bottom: 10px; display: flex; gap: 10px; }
    #result { width: 400px; height: 400px; border: 3px dashed #ccc; display: flex; align-items: center; justify-content: center; background: #fff; }
    #result img { max-width: 100%; height: auto; }
    .loading { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .btn { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #999; border-radius: 5px; }
    .btn.active { background: #3498db; color: white; }
  </style>
</head>
<body>
  <h1>Sketch to AI Image</h1>
  
  <div class="controls">
    <button id="penBtn" class="btn active">Pen</button>
    <button id="eraserBtn" class="btn">Eraser</button>
    <button id="clearBtn" class="btn">Clear All</button>
    <input type="color" id="colorPicker" value="#000000">
    <input type="range" id="sizeSlider" min="1" max="20" value="5">
  </div>

  <div class="main-container">
    <div id="canvasContainer">
      <canvas id="drawingCanvas" width="400" height="400"></canvas>
    </div>
    <div id="result">
      <p>Result will appear here</p>
    </div>
  </div>

  <br>
  <button id="processButton" style="padding: 15px 30px; font-size: 1.2rem; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer;">Generate AI Image</button>

  <script>
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    const resultDiv = document.getElementById('result');
    let drawing = false;
    let mode = 'pen';

    // Init canvas
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Tools
    document.getElementById('penBtn').onclick = () => { mode = 'pen'; updateBtns(); };
    document.getElementById('eraserBtn').onclick = () => { mode = 'eraser'; updateBtns(); };
    document.getElementById('clearBtn').onclick = () => ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    function updateBtns() {
      document.getElementById('penBtn').classList.toggle('active', mode === 'pen');
      document.getElementById('eraserBtn').classList.toggle('active', mode === 'eraser');
    }

    // Drawing Logic
    canvas.onmousedown = (e) => { drawing = true; draw(e); };
    canvas.onmousemove = (e) => { if(drawing) draw(e); };
    window.onmouseup = () => { drawing = false; ctx.beginPath(); };

    function draw(e) {
      const rect = canvas.getBoundingClientRect();
      ctx.lineWidth = document.getElementById('sizeSlider').value;
      ctx.lineCap = 'round';
      ctx.strokeStyle = mode === 'eraser' ? 'white' : document.getElementById('colorPicker').value;

      ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    // Process
    document.getElementById('processButton').onclick = async () => {
      resultDiv.innerHTML = '<div class="loading"></div>';
      const b64 = canvas.toDataURL('image/jpeg');

      try {
        const response = await fetch('http://localhost:8000/process', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image_base64: b64 })
        });

        if (!response.ok) throw new Error(await response.text());

        const data = await response.json();
        resultDiv.innerHTML = `<img src="data:image/jpeg;base64,${data.generated_image_base64}">`;
      } catch (err) {
        alert("Error: " + err.message);
        resultDiv.innerHTML = "Failed. Check console.";
        console.error(err);
      }
    };
  </script>
</body>
</html>
