<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Canvas to AI</title>
    <style>
        body { background-color: #fdf6e3; font-family: sans-serif; text-align: center; padding: 20px; }
        .toolbar { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; align-items: center; }
        .canvas-area { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        #canvasContainer { border: 4px solid #333; background: #fff; line-height: 0; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        canvas { cursor: crosshair; }
        #result { width: 400px; height: 400px; border: 4px dashed #ccc; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; }
        #result img { max-width: 100%; height: auto; }
        .btn { padding: 10px 15px; cursor: pointer; border: 1px solid #999; border-radius: 5px; background: white; }
        .btn.active { background: #3498db; color: white; border-color: #2980b9; }
        #processBtn { margin-top: 20px; padding: 15px 40px; background: #2ecc71; color: white; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; }
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: red; font-weight: bold; padding: 20px; }
    </style>
</head>
<body>
    <h1>Sketch to AI Transformation</h1>

    <div class="toolbar">
        <button id="penBtn" class="btn active">✏️ Pen</button>
        <button id="eraserBtn" class="btn">🧽 Eraser</button>
        <button id="clearBtn" class="btn">🗑️ Clear All</button>
        <input type="color" id="colorPicker" value="#000000">
        <label>Size:</label>
        <input type="range" id="sizeSlider" min="1" max="30" value="5">
    </div>

    <div class="canvas-area">
        <div id="canvasContainer">
            <canvas id="drawingCanvas" width="400" height="400"></canvas>
        </div>
        <div id="result">
            <p id="placeholderText">AI Result will appear here</p>
        </div>
    </div>

    <button id="processBtn">Generate AI Image</button>

    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const resultDiv = document.getElementById('result');
        let isDrawing = false;
        let currentMode = 'pen';

        // Initialize Canvas
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Tool Logic
        document.getElementById('penBtn').onclick = () => { currentMode = 'pen'; updateButtons(); };
        document.getElementById('eraserBtn').onclick = () => { currentMode = 'eraser'; updateButtons(); };
        document.getElementById('clearBtn').onclick = () => {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        };

        function updateButtons() {
            document.getElementById('penBtn').classList.toggle('active', currentMode === 'pen');
            document.getElementById('eraserBtn').classList.toggle('active', currentMode === 'eraser');
        }

        // Drawing Events
        canvas.onmousedown = (e) => { isDrawing = true; draw(e); };
        canvas.onmousemove = (e) => { if (isDrawing) draw(e); };
        window.onmouseup = () => { isDrawing = false; ctx.beginPath(); };

        function draw(e) {
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('sizeSlider').value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (currentMode === 'eraser') {
                ctx.strokeStyle = "white";
            } else {
                ctx.strokeStyle = document.getElementById('colorPicker').value;
            }

            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        // Process Request
        document.getElementById('processBtn').onclick = async () => {
            resultDiv.innerHTML = '<div class="loading-spinner"></div>';
            const b64 = canvas.toDataURL('image/jpeg');

            try {
                const response = await fetch('http://localhost:8000/process', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_base64: b64 })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = `<div class="error-msg">${data.error}</div>`;
                } else {
                    resultDiv.innerHTML = `<img src="data:image/jpeg;base64,${data.image}">`;
                    console.log("Prompt used:", data.prompt);
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error-msg">Connection Failed!<br><small>Make sure backend.py is running and wait for it to finish loading.</small></div>`;
            }
        };
    </script>
</body>
</html>
