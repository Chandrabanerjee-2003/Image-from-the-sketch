<!DOCTYPE html>
<html>
<head>
    <title>Sketch to AI</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fdf6e3; }
        canvas { border: 2px solid #000; background: #fff; cursor: crosshair; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        #result { width: 400px; height: 400px; border: 2px dashed #aaa; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden;}
        img { max-width: 100%; }
        .loading { color: blue; font-weight: bold; }
        .error { color: red; padding: 10px; }
    </style>
</head>
<body>
    <h1>Sketch to AI</h1>
    <button onclick="clearCanvas()">Clear</button>
    <input type="range" id="size" min="1" max="20" value="5">
    
    <div class="container">
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="result">Result appears here</div>
    </div>
    
    <br>
    <button id="go" style="padding: 10px 20px; background: green; color: white; border: none; cursor:pointer;">Generate AI Image</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resDiv = document.getElementById('result');
        let drawing = false;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, 400, 400);

        canvas.onmousedown = () => drawing = true;
        window.onmouseup = () => { drawing = false; ctx.beginPath(); };
        canvas.onmousemove = (e) => {
            if (!drawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineWidth = document.getElementById('size').value;
            ctx.lineCap = 'round';
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        };

        function clearCanvas() { ctx.fillRect(0, 0, 400, 400); resDiv.innerHTML = "Result appears here"; }

        document.getElementById('go').onclick = async () => {
            resDiv.innerHTML = '<div class="loading">AI is thinking... (check python terminal)</div>';
            const b64 = canvas.toDataURL('image/jpeg');

            try {
                const resp = await fetch('http://localhost:8000/process', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ image_base64: b64 })
                });
                const data = await resp.json();
                
                if (data.error) {
                    resDiv.innerHTML = `<div class="error"><b>Backend Error:</b><br>${data.error}</div>`;
                } else {
                    resDiv.innerHTML = `<img src="data:image/jpeg;base64,${data.image}"><br><p style="font-size:10px">${data.prompt}</p>`;
                }
            } catch (e) {
                resDiv.innerHTML = `<div class="error"><b>Connection Failed:</b><br>Is the Python server running?</div>`;
            }
        };
    </script>
</body>
</html>
